<div class="project-card">
    <h3>Project Information</h3>
    <div class="property-row compact"><div class="property-label">Version:</div><div class="property-value">{{ project.version }}</div></div>
    <div class="property-row compact"><div class="property-label">Phase:</div><div class="property-value">{{ project.phase }}</div></div>
    <div class="property-row compact"><div class="property-label">Milestone:</div><div class="property-value">{{ project.milestone }}</div></div>
    <div class="property-row compact"><div class="property-label">Status:</div><div class="property-value">{{ project.status }}</div></div>
    <div class="property-row compact"><div class="property-label">Build:</div><div class="property-value">{{ project.build }}</div></div>
</div>
